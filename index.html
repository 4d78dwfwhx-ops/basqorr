<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باسكور | قطع غيار السيارات - المملكة العربية السعودية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        * { font-family: 'Tajawal', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full text-center">
        <span class="text-6xl block mb-6">🚗</span>
        <h1 class="text-4xl font-black mb-3 text-white">باسكور</h1>
        <p class="text-xl text-orange-500 font-bold mb-6">قطع غيار سيارتك من التشليح لباب بيتك</p>
        <p class="text-gray-400 text-sm mb-6">🇸🇦 المملكة العربية السعودية</p>
        
        <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-2xl">
            <input type="text" id="vinInput" maxlength="17" placeholder="أدخل رقم الهيكل (VIN)" 
                   class="w-full p-4 bg-gray-950 border-2 border-gray-700 rounded-xl text-center font-mono text-lg uppercase tracking-[0.2em] text-orange-400 focus:outline-none focus:border-orange-500 mb-4 placeholder:text-gray-600">
            
            <button onclick="searchVIN()" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-4 rounded-xl text-lg transition-all">
                🔍 فحص السيارة
            </button>
            
            <div id="result" class="mt-4 text-right"></div>
        </div>
        
        <p class="mt-6 text-gray-600 text-xs">جميع الماركات العالمية مدعومة | توصيل فوري</p>
    </div>

    <script>
        // قاعدة بيانات الماركات
        const WMI_DB = {
            'JTD':'تويوتا','JT2':'تويوتا','JT1':'تويوتا','JTH':'لكزس','JTJ':'لكزس',
            'KMH':'هيونداي','KNA':'كيا','KND':'كيا','KMT':'جينيسيس',
            'JN1':'نيسان','JN8':'نيسان','JNK':'انفينيتي',
            'JHM':'هوندا','JH4':'اكيورا','JM1':'مازدا','JM3':'مازدا',
            'JA3':'ميتسوبيشي','JA4':'ميتسوبيشي','JSA':'سوزوكي','JS1':'سوزوكي',
            'JF1':'سوبارو','JF2':'سوبارو','JAA':'ايسوزو',
            '1FA':'فورد','1FT':'فورد','1FM':'فورد','1LN':'لينكولن',
            '1GC':'شيفروليه','1G1':'شيفروليه','1GT':'GMC','1GD':'GMC','1G6':'كاديلاك',
            '1C3':'كرايسلر','1C4':'دودج','1C6':'رام','1J4':'جيب','5YJ':'تسلا',
            'WDD':'مرسيدس','WDB':'مرسيدس','WBA':'BMW','WBS':'BMW','WAU':'أودي',
            'WVW':'فولكس واجن','WVG':'فولكس واجن','WP0':'بورش',
            'SAL':'لاند روفر','SAJ':'جاكوار','SCB':'بنتلي','SFD':'أستون مارتن',
            'YV1':'فولفو','YS3':'ساب',
            'ZFF':'فيراري','ZAM':'مازيراتي','ZAR':'ألفا روميو','ZFA':'فيات','ZHW':'لامبورغيني',
            'VF1':'رينو','VF3':'بيجو','VF7':'سيتروين',
            'LSC':'شانجان','L6T':'جيلي','LSJ':'جيلي','LVV':'شيري','LGW':'جريت وول',
            'LMG':'MG','LJD':'BYD','LNB':'BAIC','LJ8':'GAC','LZE':'JAC'
        };

        // سنة الموديل
        const YEAR_MAP = {
            'A':'2010','B':'2011','C':'2012','D':'2013','E':'2014','F':'2015',
            'G':'2016','H':'2017','J':'2018','K':'2019','L':'2020','M':'2021',
            'N':'2022','P':'2023','R':'2024','S':'2025','T':'2026'
        };

        function searchVIN() {
            const vin = document.getElementById('vinInput').value.toUpperCase().trim();
            const resultDiv = document.getElementById('result');
            
            if (vin.length !== 17) {
                resultDiv.innerHTML = '<div class="bg-red-900/30 border border-red-700 rounded-xl p-4 text-red-300">⚠️ رقم الهيكل يجب أن يتكون من 17 خانة</div>';
                return;
            }
            
            const wmi = vin.substring(0, 3);
            const make = WMI_DB[wmi];
            const year = YEAR_MAP[vin[9]] || 'غير محدد';
            
            if (!make) {
                resultDiv.innerHTML = '<div class="bg-yellow-900/30 border border-yellow-700 rounded-xl p-4 text-yellow-300">⚠️ الماركة غير مدعومة حالياً. نعمل على توسيع قاعدة البيانات.</div>';
                return;
            }
            
            resultDiv.innerHTML = `
                <div class="bg-green-900/30 border border-green-700 rounded-xl p-4 text-right">
                    <p class="text-green-300 font-bold text-lg mb-2">✅ تم العثور على السيارة</p>
                    <p class="text-white text-xl font-bold mb-1">🚙 ${make}</p>
                    <p class="text-gray-400">📅 سنة الموديل: ${year}</p>
                    <p class="text-gray-500 text-xs mt-2">رقم الهيكل: ${vin}</p>
                    <a href="https://wa.me/966500000000?text=السلام عليكم - ابحث عن قطع غيار ${make} سنة ${year}" 
                       target="_blank" 
                       class="block w-full bg-green-600 hover:bg-green-500 text-white text-center py-3 rounded-xl mt-3 font-bold transition-all">
                        💬 طلب قطع غيار واتساب
                    </a>
                </div>
            `;
        }

        document.getElementById('vinInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchVIN();
        });
    </script>
</body>
</html>
