<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="باسكور - المنصة السعودية الأولى لقطع غيار السيارات. ابحث برقم الهيكل عن قطع الغيار المناسبة لسيارتك.">
    <title>باسكور | قطع غيار السيارات - السعودية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        * { font-family: 'Tajawal', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col">

    <header class="border-b border-gray-800">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-3xl">🚗</span>
                <span class="text-2xl font-black text-orange-500">باسكور</span>
            </div>
            <span class="text-xs bg-green-900 text-green-300 px-3 py-1 rounded-full">🟢 السعودية</span>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="max-w-2xl w-full text-center">
            
            <h1 class="text-4xl font-black mb-4 text-white">قطع غيار سيارتك عند بابك</h1>
            <p class="text-gray-400 text-lg mb-8">أدخل رقم الهيكل (VIN) لتحصل على قطع الغيار المتوافقة مع سيارتك</p>

            <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl">
                <input type="text" id="vinInput" maxlength="17" placeholder="أدخل رقم الهيكل المكون من 17 خانة" 
                       class="w-full p-5 bg-gray-950 border-2 border-gray-700 rounded-xl text-center font-mono text-xl uppercase tracking-[0.3em] text-orange-400 focus:outline-none focus:border-orange-500 mb-6 placeholder:text-gray-600 placeholder:tracking-normal placeholder:font-sans placeholder:text-base">
                
                <button onclick="searchVIN()" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-5 rounded-xl text-lg transition-all shadow-lg shadow-orange-900/30">
                    فحص السيارة
                </button>

                <div id="vinResult" class="mt-6 text-right"></div>
            </div>

            <div class="mt-10">
                <p class="text-xs text-gray-600 mb-4">جميع الماركات العالمية مدعومة</p>
                <div class="flex flex-wrap justify-center gap-2">
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">تويوتا</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">لكزس</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">هيونداي</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">كيا</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">نيسان</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">هوندا</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">مازدا</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">مرسيدس</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">BMW</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">فورد</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">شفروليه</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">GMC</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">شانجان</span>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">جيلي</span>
                </div>
            </div>

        </div>
    </main>

    <footer class="border-t border-gray-900 p-6 text-center text-xs text-gray-600">
        <p>جميع الحقوق محفوظة © 2026 <span class="text-orange-500 font-bold">باسكور</span> - المملكة العربية السعودية</p>
    </footer>

    <script src="basqor.js"></script>
</body>
</html>
