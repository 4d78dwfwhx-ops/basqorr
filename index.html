<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باسكور</title>
</head>
<body dir="rtl" style="background:#111;color:white;text-align:center;padding:50px;font-family:sans-serif">
    <h1 style="font-size:50px">🚗 باسكور</h1>
    <p style="color:orange;font-size:20px">قطع غيار سيارتك من التشليح لباب بيتك - جدة</p>
    <input type="text" id="vin" placeholder="أدخل رقم الهيكل" style="padding:10px;width:80%;font-size:20px;text-align:center;margin:10px" maxlength="17">
    <br>
    <button onclick="search()" style="padding:15px 30px;background:orange;color:white;border:none;font-size:20px;border-radius:10px">بحث</button>
    <p id="r" style="margin-top:20px;font-size:18px"></p>
    <script>
        const D={'JTD':'تويوتا','KMH':'هيونداي','KNA':'كيا','JN1':'نيسان'};
        const Y={'A':'2010','B':'2011','C':'2012','D':'2013','E':'2014','F':'2015','G':'2016','H':'2017','J':'2018','K':'2019','L':'2020','M':'2021','N':'2022','P':'2023','R':'2024','S':'2025','T':'2026'};
        function search(){
            const v=document.getElementById('vin').value.toUpperCase().trim();
            const r=document.getElementById('r');
            if(v.length!==17){r.innerHTML='<span style="color:red">⚠️ 17 خانة</span>';return;}
            const m=D[v.substring(0,3)];
            r.innerHTML=m?`<span style="color:lime">✅ ${m} | ${Y[v[9]]||'?'}</span>`:'<span style="color:red">⚠️ غير مدعوم</span>';
        }
    </script>
</body>
</html>
