<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باسكور | لوحة التاجر - تشاليح قويزة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        * { font-family: 'Tajawal', system-ui, sans-serif; }
        .order-card { transition: all 0.3s ease; cursor: pointer; }
        .order-card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(249, 115, 22, 0.15); }
        .status-new { border-right: 4px solid #f97316; }
        .status-accepted { border-right: 4px solid #10b981; }
        .status-rejected { border-right: 4px solid #ef4444; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .slide-in { animation: slideIn 0.3s ease; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <header class="border-b border-gray-800 sticky top-0 bg-gray-950/95 backdrop-blur z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-3xl">🏪</span>
                <span class="text-xl font-black text-orange-500">باسكور | التاجر</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs bg-green-900 text-green-300 px-3 py-1 rounded-full">🟢 متصل</span>
                <span class="text-xs bg-gray-800 px-3 py-1 rounded-full" id="newOrdersCount">0 طلبات جديدة</span>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4">
        <div class="flex justify-between items-center mt-6 mb-4">
            <h1 class="text-xl font-bold">📥 الطلبات الواردة</h1>
            <div class="flex gap-2">
                <button onclick="refreshOrders()" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-xl text-sm transition-all">🔄 تحديث</button>
                <button onclick="filterOrders('all')" class="bg-orange-600 hover:bg-orange-500 px-4 py-2 rounded-xl text-sm transition-all">الكل</button>
                <button onclick="filterOrders('pending')" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-xl text-sm transition-all">جديد</button>
                <button onclick="filterOrders('accepted')" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-xl text-sm transition-all">مقبول</button>
            </div>
        </div>

        <div id="ordersContainer" class="space-y-3">
            <p class="text-center text-gray-600 py-20">لا توجد طلبات حالياً</p>
        </div>
    </main>

    <footer class="border-t border-gray-900 p-4 text-center text-xs text-gray-600 mt-10">
        <p>© 2026 <span class="text-orange-500 font-bold">BASQOR</span> - لوحة التاجر | تشاليح قويزة - جدة</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
